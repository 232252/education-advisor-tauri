name: CI

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main, release/**]
  workflow_dispatch:

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # Quality gates — must pass before any merge.
  # ----------------------------------------------------------------
  quality-gates:
    name: Quality gates (typecheck + lint + test + coverage)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Show environment
        shell: bash
        run: |
          node -v
          npm -v
          echo "Runner: ${{ runner.os }}"

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Test with coverage
        shell: bash
        run: npm run test:coverage

      - name: Coverage threshold check (core modules)
        shell: bash
        run: |
          node scripts/coverage-threshold.mjs

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: education-advisor-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/tmp
          retention-days: 14

      - name: Build (renderer + main)
        shell: bash
        run: npm run build

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/
            !dist/**/*.map
          retention-days: 7

  # ----------------------------------------------------------------
  # Performance baseline — runs only on linux to save CI minutes.
  # Measures test suite duration, build time, and reports regressions.
  # ----------------------------------------------------------------
  performance-baseline:
    name: Performance baseline
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run performance baseline
        shell: bash
        run: |
          node scripts/perf-baseline.mjs
        env:
          CI: 'true'

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: |
            perf-report.json
            perf-report.md
          retention-days: 30

  # ----------------------------------------------------------------
  # Visual regression — captures screenshots of each page via CDP
  # and compares against baseline. Only on linux.
  # ----------------------------------------------------------------
  visual-regression:
    name: Visual regression (CDP screenshots)
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Build renderer + main
        shell: bash
        run: npm run build

      - name: Run visual regression (smoke)
        shell: bash
        run: |
          # Visual regression needs a running Electron app with CDP enabled.
          # In CI (headless linux) we cannot run Electron GUI, so this step
          # is a smoke check of the screenshot harness script only.
          # Run locally with `node tests/e2e/visual-regression.js` against a
          # running `npm run dev` instance.
          node -e "console.log('[visual-regression] Smoke check skipped on CI (no Electron GUI). Run tests/e2e/visual-regression.js locally.');"

      - name: Upload visual baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline
          path: |
            tests/e2e/screenshots/
          retention-days: 30
          if-no-files-found: ignore

  # ----------------------------------------------------------------
  # CodeQL — security static analysis.
  # ----------------------------------------------------------------
  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [typescript, javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ----------------------------------------------------------------
  # Auto-update manifest — runs on tagged releases.
  # ----------------------------------------------------------------
  auto-update-manifest:
    name: Generate auto-update manifest
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality-gates
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest
        shell: bash
        run: |
          # Build the latest.yml / latest-mac.yml / latest-linux.yml
          # that electron-builder's auto-update expects.
          node scripts/generate-update-manifest.mjs "${{ github.ref_name }}"

      - name: Upload manifests
        uses: actions/upload-artifact@v4
        with:
          name: update-manifests
          path: |
            latest.yml
            latest-mac.yml
            latest-linux.yml
            release-notes.md
          retention-days: 30
